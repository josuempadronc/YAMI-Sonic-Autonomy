name: Build YAMI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar dependencias Linux
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev \
            automake autopoint gettext build-essential

      - name: Configurar Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH
          /usr/lib/jvm/temurin-17-jdk-amd64/bin/java -version

      - name: Instalar buildozer y Cython
        run: |
          pip3 install --upgrade pip
          pip3 install cython==0.29.33
          pip3 install --upgrade setuptools
          pip3 install buildozer==1.5.0

      - name: Setup Android SDK
        run: |
          SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          $SDKMANAGER "build-tools;34.0.0" "platforms;android-33" "ndk;25.2.9519653"
          # Buildozer llama tools/bin/sdkmanager (ruta vieja); crear wrapper al nuevo
          mkdir -p $ANDROID_HOME/tools/bin
          printf '#!/bin/bash\nexec /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "$@"\n' > $ANDROID_HOME/tools/bin/sdkmanager
          chmod +x $ANDROID_HOME/tools/bin/sdkmanager
          cat $ANDROID_HOME/tools/bin/sdkmanager

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v4-

      - name: Compilar APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: YAMI-Sonic-Autonomy-APK
          path: bin/*.apk
          retention-days: 30
